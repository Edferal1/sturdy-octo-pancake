<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jokenpô PWA</title>
    <link rel="manifest" href="manifest.json">
    <style>
        /* Um pouco de estilo para ficar com cara de App de celular */
        body { font-family: sans-serif; text-align: center; background-color: #f0f0f0; padding: 20px; }
        img { width: 80px; height: 80px; margin: 10px; border-radius: 10px; }
        .placar-box { font-size: 1.5rem; font-weight: bold; color: #333; margin-top: 20px; }
        button { padding: 10px 20px; font-size: 1rem; cursor: pointer; border-radius: 5px; border: none; background: #007bff; color: white; }
    </style>
</head>
<body>
    <h1>Jokenpô v1.0</h1>
    
    <h3>Sua Escolha:</h3>
    <form name="frmjokenpo">
        <input type="radio" name="grupo" id="pedra"> Pedra
        <input type="radio" name="grupo" id="papel"> Papel
        <input type="radio" name="grupo" id="tesoura"> Tesoura
        <p>
            <button type="button" onclick="jogar()">JOGAR</button>
            <button type="reset" onclick="resetar()" style="background:#6c757d;">RESET</button>
        </p>
    </form>

    <hr>
    <h3>Computador:</h3>
    <img src="pc.png" alt="pc" id="pc">
    
    <div id="placar" class="placar-box">Escolha uma opção e jogue!</div>

    <script>
        function jogar() {
            // 1. Criamos "listas" (arrays) para organizar as opções
            const opcoes = ["pedra", "papel", "tesoura"];
            const imagensPC = ["pcpedra.png", "pcpapel.png", "pctesoura.png"];
            let escolhaJogador = -1;

            // 2. O "Lace de Repetição" (FOR) percorre as opções para ver qual você marcou
            for (let i = 0; i < opcoes.length; i++) {
                if (document.getElementById(opcoes[i]).checked) {
                    escolhaJogador = i; // Guarda o número da sua escolha (0, 1 ou 2)
                }
            }

            // Validação simples: se não escolheu nada, avisa!
            if (escolhaJogador === -1) {
                alert("Por favor, selecione uma opção antes de jogar!");
                return;
            }

            // 3. Sorteio do Computador (Gera 0, 1 ou 2 aleatoriamente)
            let sorteio = Math.floor(Math.random() * 3);
            
            // Troca a imagem do computador conforme o sorteio
            document.getElementById("pc").src = imagensPC[sorteio];

            // 4. A Lógica Matemática (O pulo do gato)
            // (Jogador - PC + 3) % 3 sempre resulta em: 0 (empate), 1 (ganhou), 2 (perdeu)
            let resultado = (escolhaJogador - sorteio + 3) % 3;
            const mensagens = ["EMPATE! ", "VOCÊ VENCEU!", "PC VENCEU!"];
            
            document.getElementById("placar").innerHTML = mensagens[resultado];
        }

        function resetar() {
            document.getElementById("pc").src = "pc.png";
            document.getElementById("placar").innerHTML = "Escolha uma opção e jogue!";
        }

        // --- CÓDIGO DO SERVICE WORKER (Para o PWA funcionar offline) ---

       if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('SW registrado:', reg.scope))
      .catch(err => console.log('Erro SW:', err));
  });
}
    </script>
</body>
</html>
